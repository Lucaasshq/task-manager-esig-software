<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	template="WEB-INF/template/Layout.xhtml">

	<ui:define name="conteudo">

		<style type="text/css">
.main-container {
	display: flex;
	justify-content: center;
	padding: 20px;
	background-color: #f4f7f9;
	min-height: 80vh;
}

.card-cadastro {
	width: 800px;
}

.config-container {
	display: flex;
	gap: 30px;
}

.label-bold {
	font-weight: bold;
}

.footer-actions {
	text-align: right;
}

.icon-titulo {
	color: #2196F3;
	margin-right: 8px;
}


</style>

		<div class="ui-fluid main-container">
			<h:form id="form">
			<p:growl id="growl" showDetail="true" />
				<p:card styleClass="card-cadastro">
					<f:facet name="title">
						 Cadastro de Tarefas
                    </f:facet>

					<h:panelGrid columns="2"
						columnClasses="ui-grid-col-3 label-bold, ui-grid-col-9"
						style="width: 100%;" cellpadding="7">

						<p:outputLabel for="titulo" value="Título da Tarefa:" />
						<h:panelGroup>
							<p:inputText id="titulo" value="#{tarefaBean.tarefa.titulo}"
								placeholder="Ex: Finalizar relatório" required="true" />
							<p:message for="titulo" display="text"></p:message>
						</h:panelGroup>


						<p:outputLabel for="descricao" value="Descrição:" />
						<h:panelGroup>
							<p:inputTextarea id="descricao" rows="3" autoResize="false"
								placeholder="Ex:Detalhes da tarefa"
								value="#{tarefaBean.tarefa.descricao}" required="true" />
							<p:message for="descricao" display="text"></p:message>
						</h:panelGroup>

						<p:outputLabel value="Responsavel:" />
						<div class="config-container">
							<h:panelGroup>
								<p:selectOneMenu id="resp"
									value="#{tarefaBean.tarefa.responsavel}" filter="true"
									converter="omnifaces.SelectItemsConverter">
									<f:selectItem itemLabel="Selecione" value="#{null}"></f:selectItem>
									<f:selectItems value="#{tarefaBean.responsaveis}" var="respon"
										itemLabel="#{respon.nome}" itemValue="#{respon}" />
								</p:selectOneMenu>
								<p:message for="resp"></p:message>
							</h:panelGroup>

							<h:panelGroup>
								<p:selectOneMenu id="prio"
									value="#{tarefaBean.tarefa.prioridade}">
									<f:selectItem itemLabel="Prioridade" />
									<f:selectItems value="#{tarefaBean.prioridades}"
										var="prioridade" itemLabel="#{prioridade.descricao}"
										itemValue="#{prioridade}" />
								</p:selectOneMenu>
								<p:message for="prio"></p:message>
							</h:panelGroup>

						</div>

						<p:outputLabel for="deadLine" value="Dead Line:" />
						<h:panelGroup>
							<p:datePicker id="deadLine" showIcon="true" pattern="dd/MM/yyyy" style="background-color: white;"
								value="#{tarefaBean.tarefa.deadLine}" locale="pt_BR" />
							<p:message for="deadLine"></p:message>
						</h:panelGroup>

					</h:panelGrid>

					<f:facet name="footer">
						<div class="footer-actions">
							<p:commandButton value="Salvar Tarefa" icon="pi pi-check"
								action="#{tarefaBean.salvarTarefa}" update="@form" styleClass="ui-button-danger" />
						</div>
					</f:facet>
				</p:card>
			</h:form>
		</div>
	</ui:define>
</ui:composition>
