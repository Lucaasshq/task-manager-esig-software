<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
	<meta charset="UTF-8" />
	<title><ui:insert name="titulo" />Tarefa Cadastro</title>
	<h:outputStylesheet library="estilo" name="style.css" />


	<f:metadata>
		<f:viewAction action="#{gestaoEmpresasBean.todasEmpresas}" />
	</f:metadata>
</h:head>
<body>


	<header
		style="display: flex; align-items: center; justify-content: space-between;">
		<h:graphicImage library="estilo" name="logo.svg" />

		<h:panelGroup>
			<h:form>
				<p:commandButton value="Criar Tarefa"
					action="tarefaFormulario?faces-redirect=true" style="margin-right:10px" />
				<p:commandButton value="Ver Tarefas" styleClass="ui-button-success"
					action="tarefa?faces-redirect=true" style="margin-right: 10px" />
					<p:commandButton value="Adicionar Responsavel" styleClass="ui-button-success"
					action="responsavelForm?faces-redirect=true" style="margin-right: 10px" />
			</h:form>
		</h:panelGroup>
	</header>
	<ui:insert name="titulo" />


	<div id="conteudo">
		<ui:insert name="conteudo" />

	</div>


	<footer>Gestão de Tarefas ESIG</footer>

</body>
</html>
